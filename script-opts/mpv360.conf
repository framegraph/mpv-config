 # Start with 360° mode enabled
enabled=no
 # Show camera orientation on change
show_values=no
 # Invert mouse movement
invert_mouse=no
 # Mouse look sensitivity
mouse_sensitivity=0.005
 # Capture cursor to avoid it reaching screen boundaries during mouse look
 # Works only for Windows with mpv that uses LuaJIT
capture_cursor=yes
 # Invert keyboard controls
invert_keyboard=no
 # Step for keyboard controls
step=0.025
 # Multiply step for FOV adjustments by mouse wheel
scroll_multiplier=3.0
 # Step for fisheye FOV adjustment
fisheye_fov_step=0.1745329251

 # Initial camera orientation (in radians)
yaw=0.0
pitch=0.0
roll=0.0
fov=2.0

 # Initial projection:
## 0=equirectangular, 1=dual_fisheye, 2=dual_hequirectangular, 3=hequirectangular,
## 4=Dual Equirectangular (Vert), 5=Cylindrical, 6=Equi-Angular Cubemap, 7=Dual Equi-Angular Cubemap
input_projection=6
## 0=left, 1=right (for dual formats)
eye=0
 # fisheye fov (0 to 2π]
fisheye_fov=3.1415926535897932
## 0=linear, 1=mitchell, 2=lanczos
sampling=0
 # Enable specified display-sync option during 360° mode (empty value to disable)
 # to allow rendering camera movement at monitor refresh rate, instead of video frame rate (usually 24-30 fps)
vsync_mode=display-resample

 # Keybindings (you can define multiple by separating by spaces)
toggle=Ctrl+e Ctrl+у Alt+e
toggle-values=F1
look-up=w W ц Ц
look-down=s S ы Ы
look-left=a A ф Ф
look-right=d D в В
roll-left=x X ч Ч
roll-right=z Z я Я
fov-increase=q Q й Й
fov-decrease=e E у У
reset-view=c C с С
cycle-projection=f а Ctrl+Shift+p
fisheye-fov-increase=Shift+f
fisheye-fov-decrease=Alt+f
switch-eye=Ctrl+Shift+e
cycle-sampling=Ctrl+Shift+s
toggle-mouse-look=MBTN_LEFT
show-help=Ctrl+t ?
