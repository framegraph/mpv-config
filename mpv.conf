# Файл с настройками плеера MPV
# (решётка) в начале строки отключает опцию (превращает в комментарий) 

#Пути
--script-opts=ytdl_hook-try_ytdl_first=yes,ytdl_hook-exclude="%.webm$|%.ts$|%.mp3$|%.m3u8$|%.m3u$|%.mkv$|%.mp4$|%.VOB$"
--screenshot-directory=~~desktop/screenshot
--watch-later-directory=~/AppData/Roaming/mpv/watch_later  #возвращение старого пути сохранения для избежания сброса сохранённых позиций просмотра



#Сохранение состояния
 # названия свойств (они же опции) можно посмотреть в мануале mpv: https://mpv.io/manual/stable/#options

 # свойства, сохраняемые между перезапусками плеера глобально (через запятую)
 # Внимание: эти свойства уже не получится менять в mpv.conf, поскольку при запуске плеера будут восстанавливаться прежние значения
--script-opts-append=persist_properties-properties=volume,mute,af,loop-file,loop-playlist,correct-downscaling,linear-downscaling,scale,hwdec,deband,dither-depth,scale-antiring

 # свойства, сохраняемые для каждого видео отдельно 
 # при переключении на новое для плеера видео значения останутся прежними (и плеер их также зафиксирует для нового видео!), кроме позиции просмотра start
--watch-later-options=start,sid,secondary-sid,aid

 # свойства, сохраняемые в файл плейлиста при выборе режима сохранения плейлиста с параметрами:
 # восстаналиваются в сохранённом виде при его открытии и сбрасываются в изначальные значения при закрытии плейлиста
--script-opts-append=playlistmanager-per_playlist_properties=glsl-shaders,vf,af,hwdec,sub-delay,audio-delay,sub-pos,secondary-sub-pos,sub-scale,sub-fps,video-aspect-override,contrast,brightness,gamma,saturation
--script-opts-append=playlistmanager-revert_after_playlist_closing=yes  #сбрасывать ли свойства при окончании просмотра из плейлиста

 # свойства, которые наоборот, нужно сбрасывать в значения по умолчанию при каждой смене видео
--reset-on-next-file=video-zoom,video-pan-x,video-pan-y,video-scale-x,video-scale-y,ab-loop-a,ab-loop-b

--save-position-on-quit
--write-filename-in-watch-later-config




#Интерфейс
--title=${media-title:MPV Player}
--osc=no
--osd-bar=no
#--border=no # по желанию можно убрать рамку вокруг окна плеера
--keep-open=yes   # при окочании всех видео: no - переход в главное меню, yes - остановка на последнем кадре
--osd-font-size=30
--osd-border-size=1
--osd-font=Inter
--autofit=75%x75%
--osd-duration=3000
--idle=yes
#--log-file=~~exe_dir/mpv.log # если потребуется, можно включить запись логов (в папку с плеером)
--ontop=no
--snap-window   # привязка к краям экрана при перемещении окна плеера рядом с ними
--force-window=immediate   # открытие окна плеера, не дожидаясь, пока загрузится видео (полезно при открытии плейлиста с онлайн видео)
--osd-margin-x=25 # значения по умолчанию для mpv v0.38
--osd-margin-y=22




#Ютуб
 # качество по умолчанию 1440p SDR с избеганием тяжёлого кодека AV1 и нестандартной разновидности VP09, которую плеер не может воспроизвести
--ytdl-format="bestvideo[height<=?1440][vcodec!*=av01][vcodec!*=vp09][format_note!*=HDR]+bestaudio / bestvideo+bestaudio / best[height<=?1440] / best"

--ytdl-raw-options-append=extractor-args=youtube:lang=ru #локализованные название и описание ролика + авто-выбор русской дорожки при наличии
--ytdl-raw-options-append=encoding=utf8 #вывод ошибок на русском читаемым текстом

 # категории Sponsorblock для автопропуска рекламы, интегрированной в ролики ютуба; если убрать их все, сегменты запрашиваться перестанут
 # доступные категории: sponsor (спонсорская реклама), selfpromo (самореклама), interaction (просьбы подписаться), intro (заставка), outro (концовка),
 # preview (краткое содержание), music_offtopic (тишина в музыкальных роликах), filler (не относящееся к сути)
--script-opts-append=sponsorblock_minimal-categories=sponsor,selfpromo,interaction

 # по желанию можно задать свой HTTP-прокси для воспроизведения онлайн-видео (системный прокси используется автоматически)
#--ytdl-raw-options-append=proxy=http://127.0.0.1:8080

 # user-agent для видео по прямой ссылке (по умолчанию "libmpv"), для видеохостингов устанавливается автоматически yt-dlp
--user-agent=Mozilla/5.0 (Windows NT 6.1; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.121 Safari/537.36 #самая последняя версия chrome для windows 7

 # альтернативные настройки для ютуба: изменение получаемых форматов видео с ютуба на HLS, чтобы избежать ограничения скорости ютубом на величину битрейта видео
 # такие форматы доступны по 1080p, но качество выше можно будет выбрать вручную (в прежних форматах с троттлингом)
 # однако плеер не очень хорошо поддерживает HLS, поэтому возможны баги (иногда невозможно перемотать в самое начало из середины - помогает перезагрузка с начала Ctrl+F5)
 # также плеер иногда может пропускать неудачно загрузившиеся сегменты (чанки) HLS - можно сбросить кэш двойным переключением аудио клавишей "-" и затем перемотать назад
 # можно также попробовать включить кэш видео целиком на диск (ниже в настройках кэша) - по моим наблюдениям, при непрерывной буферизации таких пропусков гораздо меньше
 # здесь используются немного нестандартные настройки yt-dlp, поэтому возможно, что спустя время видео с ютуба перестанут открываться (тогда их придётся отключить)
 # (но перед этим стоит попробовать обновить парсер yt-dlp через меню плеера или комбинацией Alt+u)
#--ytdl-format="best[height<=?1440][protocol^=m3u8] / bestvideo[height<=?1440][vcodec!*=av01][vcodec!*=vp09][format_note!*=HDR]+bestaudio / bestvideo+bestaudio / best[height<=?1440] / best"
#--ytdl-raw-options-append=extractor-args=youtube:lang=ru;player-client=web_safari,android_vr




#Кэш
--demuxer-readahead-secs=10 #небольшой кэш для локальных файлов, чтобы не прерывалось видео при загруженности диска (по умолчанию 1 сек)
#--cache-secs=60 #опережающий кэш для онлайн-видео
#--demuxer-max-bytes=150M #размер кэша в RAM (по умолчанию 150 МБ)
#--demuxer-max-back-bytes=50M #размер остаточного кэша перед текущей позицией (по умолчанию 50 МБ)

 # по желанию можно включить кэширование целиком файлов с сети на диск (как в PotPlayer)
 # чтобы кэшировать видео больше ~2.5 часов придётся также увеличить кэш в RAM (в ней всё ещё хранятся метаданные)
#--cache-on-disk=yes
#--demuxer-cache-dir=   #можно вписать свой путь (по умолчанию - во временную папку на диске C)




#Видео
--video-sync=audio
--priority=abovenormal
--video-output-levels=full
--hwdec=auto-safe  # это лишь значение по умолчанию; для изменения типа декодирования нужно изменить опции ниже (полностью откл HW декодирование можно через Ctrl+h в плеере)
--script-opts-append=autofilter-hw_zerocopy=auto-safe # используемый тип аппаратного декодирования в режиме zero-copy (менее требовательный к ресурсам) (auto-safe, d3d11va, dxva2 ...)
--script-opts-append=autofilter-hw_copyback=auto-copy-safe # тип декодирования с копированием кадров в RAM на время использования видео-фильтров (auto-copy-safe, d3d11va-copy, dxva2-copy ...)
--tone-mapping=bt.2446a
--vo=gpu-next
--hdr-compute-peak=auto
--hr-seek=yes       # default - быстрая перемотка стрелками по ключевым кадрам, с помощью шкалы времени - точная.  yes - использовать только точную перемотку
--deband 			# сглаживание градиентов: ресурсов потребляет мало, сила небольшая - рекомендую не выключать
--scale=catmull_rom   # если ПК помощнее, рекомендую "ewa_lanczos" (Jinc)
--cscale=bilinear     # качественный апскейл для цветовых каналов менее заметен, а нагрузка в 2 раза больше, чем для канала яркости
--dscale=hermite          # здесь и в 2 опциях ниже идут значения по умолчанию для mpv 0.38
--correct-downscaling=yes
--linear-downscaling=yes
--dither-depth=no       # отключение дизеринга - для сглаживания градиентов уже используется дебандинг
--sigmoid-upscaling=no  # делает небольшой anti-ringing при апскейле; но при включении могут искажаться цвета при использовании шейдеров!
--deinterlace=auto




#Аудио
--alang=rus,ru
--audio-file-auto=fuzzy
--audio-file-paths=**
--audio-channels=stereo #если убрать, на стерео-динамиках пропадут все остальные звуковые каналы на 5.1 аудио
--ao=wasapi
--volume-max=150




#Субтитры
--slang=rus,ru
--sub-ass-vsfilter-color-compat=full
--sub-auto=fuzzy
--sub-file-paths=**
--sub-font="calibri bold"
--sub-use-margins
--sub-margin-y=30
--sub-font-size=40
--sub-color="#FFFFFFFF"
--sub-border-size=2
--sub-pos=97
--secondary-sub-pos=10
--sub-blur=1
--sub-ass-override=scale # при масштабировании субтитров не менять размер надписей, чтобы они не съезжали со своего места




#Cкриншоты
--screenshot-format=png
--screenshot-png-compression=1
--screenshot-png-filter=5
--screenshot-tag-colorspace=yes
--screenshot-high-bit-depth=no
--screenshot-template=mpv-shot_%{media-title}_%P

