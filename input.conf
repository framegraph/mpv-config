# Базовое управление плеером
RIGHT 		    seek 5; script-binding  uosc/flash-timeline # перемотка вперёд-назад
LEFT  		    seek -5; script-binding  uosc/flash-timeline
UP              no-osd add volume 5; no-osd set mute no; script-binding uosc/flash-volume # громче-тише
DOWN 		    no-osd add volume -5; no-osd set mute no; script-binding uosc/flash-volume
m               no-osd cycle mute; script-binding uosc/flash-volume         # вкл-выкл звук
Ctrl+WHEEL_UP   no-osd add speed 0.125; script-binding uosc/flash-speed  # скорость быстрее-медленнее (один из вариантов)
Ctrl+WHEEL_DOWN no-osd add speed -0.125; script-binding uosc/flash-speed
Ctrl+MBTN_MID   no-osd set speed 1; script-binding uosc/flash-speed # сброс скорости
MBTN_RIGHT      cycle pause; script-binding uosc/flash-pause-indicator # пауза/продолжить
SPACE           ignore; cycle pause; script-binding uosc/flash-pause-indicator  # ignore в начале для отключения быстрого повторения при зажатии клавиши
WHEEL_UP        ignore
WHEEL_DOWN      ignore
MBTN_MID        script-binding uosc/menu    # открытие меню
0               seek 0 absolute; script-binding uosc/flash-timeline  # перемотка в начало
ENTER           cycle fullscreen # полноэкранный режим
KP_ENTER        cycle fullscreen # Enter на Numpad
MBTN_LEFT_DBL   script-message safe-toggle-fullscreen 80    #80 - число пикселей от низа окна плеера, при кликах в области которых не переходить в полноэкранный режим
.               repeatable frame-step; show-text ${estimated-frame-number}/${estimated-frame-count}      # покадровая перемотка
,               repeatable frame-back-step; show-text ${estimated-frame-number}/${estimated-frame-count}
;               repeatable seek -60; script-binding  uosc/flash-timeline # длинная перемотка
'               repeatable seek 60; script-binding  uosc/flash-timeline



