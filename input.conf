Ctrl+F10 no-osd change-list glsl-shaders toggle "~~/shaders/gaussianBlur.glsl"
Ctrl+F11 no-osd change-list glsl-shaders toggle "~~/shaders/SSimSuperRes.glsl"
Ctrl+F12 no-osd change-list glsl-shaders toggle "~~/shaders/antiring.hook"     
                   
MOUSE_MOVE script-binding uosc/flash-ui

Ctrl+f script-message-to SimpleHistory history-search #открыть историю просмотра сразу с полем для поиска

ESC no-osd set fullscreen no; no-osd set panscan 0; no-osd set osd-msg1 ''


Shift+UP ignore
Shift+DOWN ignore
Ctrl+Shift+LEFT ignore
Ctrl+Shift+RIGHT ignore
I ignore     
W ignore
u ignore
/ ignore



# Горячие клавиши в меню uosc

TAB         script-binding uosc/menu
o           script-binding uosc/open-file          #! Навигация > Открыть файл
Shift+o     script-binding uosc/show-in-directory  #! Навигация > Показать в папке
Ctrl+c run powershell set-clipboard '"${path}"'; show-text 'Скопировано: ${path}' #! Навигация > Копировать ссылку на видео
Ctrl+v script-message open-clipboard               #! Навигация > Открыть ссылку из буфера обмена
Ctrl+Shift+v script-message append-clipboard       #! Навигация > Добавить ссылку в плейлист
Home          script-binding uosc/prev             #! Навигация > Предыдущий файл
End           script-binding uosc/next             #! Навигация > Следующий файл
Shift+Del   script-binding uosc/delete-file-next   #! Навигация > Удалить файл и перейти далее
Alt+Shift+Del script-binding uosc/delete-file-quit #! Навигация > Удалить файл и выйти

F5 script-message-to reload reload_resume		   #! Воспроизведение > Перезагрузить медиафайл > Перезагрузить с текущей позиции
Ctrl+F5 no-osd set file-local-options/resume-playback no; delete-watch-later-config; playlist-play-index current #! Воспроизведение > Перезагрузить медиафайл > Перезагрузить с начала
\ no-osd set speed 1; script-binding uosc/flash-speed #! Воспроизведение > Скорость воспроизведения > Восстановить скорость
[ no-osd repeatable add speed -0.125; script-binding uosc/flash-speed #! Воспроизведение > Скорость воспроизведения > Уменьшить скорость
] no-osd repeatable add speed  0.125; script-binding uosc/flash-speed #! Воспроизведение > Скорость воспроизведения > Увеличить скорость
e           script-binding uosc/chapters           #! Воспроизведение > Эпизоды > Список эпизодов
PGUP 		ignore; add chapter -1                 #! Воспроизведение > Эпизоды > Предыдущий эпизод
PGDWN 		ignore; add chapter 1                  #! Воспроизведение > Эпизоды > Следующий эпизод
v           script-binding uosc/stream-quality     #! Воспроизведение > Качество потока
Shift+e     script-binding uosc/editions           #! Воспроизведение > Редакции (Издания)
s script-binding skip-to-silence 				   #! Воспроизведение > Перемотка до тишины
Ctrl+z revert-seek; script-binding  uosc/flash-timeline #! Воспроизведение > Отменить последнюю перемотку
z revert-seek mark-permanent; show-text ${time-pos} 1500 #! Воспроизведение > Пометить позицию для отмены перемотки
l ab-loop                              			   #! Воспроизведение > Повтор отрезка A-B
Ctrl+Enter no-osd cycle-values panscan 1 0; set fullscreen yes  #! Воспроизведение > Заполнить видео весь экран

j           script-binding uosc/subtitles          #! Субтитры > Выбрать субтитры
Ctrl+Ins script-binding uosc/load-subtitles        #! Субтитры > Добавить внешние субтитры
= cycle sub; show_text ${track-list}               #! Субтитры > Последовательное переключение
t  ignore; no-osd cycle file-local-options/sub-visibility; show-text 'Субтитры ${?sub-visibility==yes:видимы}${?sub-visibility==no:скрыты}' 1500  #! Субтитры > Скрыть / показать субтитры
F2 ignore; no-osd cycle file-local-options/sub-visibility; show-text 'Субтитры ${?sub-visibility==yes:видимы}${?sub-visibility==no:скрыты}' 1500  #! Субтитры > Скрыть / показать субтитры
+ cycle secondary-sid; show_text ${track-list}     #! Субтитры > Вторые субтитры > Последовательное переключение
Shift+t ignore; no-osd cycle file-local-options/secondary-sub-visibility; show-text 'Вторые субтитры ${?secondary-sub-visibility==yes:видимы}${?secondary-sub-visibility==no:скрыты}' 1500  #! Субтитры > Вторые субтитры > Скрыть / показать вторые субтитры
F3      ignore; no-osd cycle file-local-options/secondary-sub-visibility; show-text 'Вторые субтитры ${?secondary-sub-visibility==yes:видимы}${?secondary-sub-visibility==no:скрыты}' 1500  #! Субтитры > Вторые субтитры > Скрыть / показать вторые субтитры
Shift+Alt+UP	add secondary-sub-pos -1           #! Субтитры > Вторые субтитры > Позиция вторых субтитров > Сдвинуть вверх
Shift+Alt+DOWN 	add secondary-sub-pos 1            #! Субтитры > Вторые субтитры > Позиция вторых субтитров > Сдвинуть вниз
w script-message swap-subtitles                    #! Субтитры > Поменять субтитры местами
Alt+UP 		add sub-pos -1                         #! Субтитры > Позиция и размер субтитров > Сдвинуть вверх
Alt+DOWN 	add sub-pos 1                          #! Субтитры > Позиция и размер субтитров > Сдвинуть вниз
Alt+LEFT 	add sub-scale -0.05                    #! Субтитры > Позиция и размер субтитров > Уменьшить размер
Alt+RIGHT   add sub-scale +0.05                    #! Субтитры > Позиция и размер субтитров > Увеличить размер
#           set sub-delay 0 					   #! Субтитры > Синхронизация субтитров > Убрать задержку
Ctrl+LEFT   add sub-delay +0.1					   #! Субтитры > Синхронизация субтитров > Сдвинуть назад на 0.1с (задержка)
Ctrl+RIGHT  add sub-delay -0.1					   #! Субтитры > Синхронизация субтитров > Сдвинуть вперёд на 0.1с (опережение)
Shift+f cycle-values sub-fps 23.976 24 25 29.97 30 0  #! Субтитры > FPS субтитров > Последовательное переключение
#           set sub-fps 0    					   #! Субтитры > FPS субтитров > По умолчанию
#           set sub-fps 23.976					   #! Субтитры > FPS субтитров > 23.976
#           set sub-fps 24   					   #! Субтитры > FPS субтитров > 24
#           set sub-fps 25   					   #! Субтитры > FPS субтитров > 25
#           set sub-fps 29.97					   #! Субтитры > FPS субтитров > 29.970
#           set sub-fps 30   					   #! Субтитры > FPS субтитров > 30
Ctrl+KP0 set sub-delay 0; set sub-fps 0; show-text 'Восстановлен тайминг субитров по умолчанию'  #! Субтитры > Восстановить тайминг по умолчанию

a           script-binding uosc/audio              #! Аудиодорожки > Выбрать аудиодорожку
Ins script-binding uosc/load-audio                 #! Аудиодорожки > Добавить внешнюю аудиодорожку
