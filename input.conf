Ctrl+u cycle-values scale "ewa_lanczos" "catmull_rom"; show-text 'Качественный апскейлинг: ${?scale==ewa_lanczos:вкл (Jinc)}${?scale==catmull_rom:откл (Bicubic)}' #! Качество и производительность > Качественный апскейлинг
Ctrl+d cycle correct-downscaling; cycle linear-downscaling; show-text 'Качественный даунскейлинг: ${correct-downscaling}' #! Качество и производительность > Качественный даунскейлинг
Alt+a cycle-values scale-antiring 0.7 0; show-text 'Anti-ringing при апскейлинге: ${?scale-antiring==0.7:вкл}${?scale-antiring==0:откл}'  #! Качество и производительность > Anti-ringing фильтр при апскейлинге
Alt+d cycle deband; show-text 'Сглаживание градиентов: ${deband}' #! Качество и производительность > Сглаживание градиентов (Debanding)
Ctrl+Alt+d cycle-values dither-depth auto no; show-text 'Дизеринг: ${?dither-depth==auto:вкл}${?dither-depth==no:откл}' #! Качество и производительность > Дизеринг
